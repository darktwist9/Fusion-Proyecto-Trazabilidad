services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agronexus-laravel
    volumes:
      - .:/var/www
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: agronexus_db
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      FIRMS_API_KEY: ${FIRMS_API_KEY:-}
      CACHE_STORE: database
      CACHE_DRIVER: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: sync
    depends_on:
      - db
    networks:
      - agronexus-net
  nginx:
    image: nginx:latest
    container_name: agronexus
    expose:
      - "80"
    ports:
      - "8084:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - agronexus-net
      - internal-network
      - proxy-network
  db:
    image: postgres:latest
    container_name: agronexus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agronexus_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - agronexus-net

networks:
  agronexus-net:
    driver: bridge
  internal-network:
    external: true
  proxy-network:
    external: true

volumes:
  db-data:
